<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhomei - Registro</title>

<!-- CSS GLOBAL -->
<link rel="stylesheet" href="./css/style.css">

</head>

<body>

<!-- NAVBAR GLOBAL -->
<div id="navbar-container"></div>

<div class="container auth-container">

    <h2>Crear Cuenta</h2>

    <form id="formRegistro">

        <input type="text"
               id="nombre"
               placeholder="Nombre completo"
               required>

        <input type="email"
               id="correo"
               placeholder="Correo electrónico"
               required>

        <input type="text"
               id="celular"
               placeholder="Número celular"
               required>

        <input type="password"
               id="pass1"
               placeholder="Contraseña"
               required>

        <input type="password"
               id="pass2"
               placeholder="Confirmar contraseña"
               required>

        <button type="submit">
            Registrarme
        </button>

        <div class="link">
            ¿Ya tienes cuenta?
            <a href="login.html">Inicia sesión</a>
        </div>

        <div id="message"></div>

    </form>

</div>

<!-- NAVBAR -->
<script src="./js/navbar.js"></script>

<script>

const API_URL = "https://dhomei-backend.onrender.com/api/v1/auth/register";

// 🔁 SI YA ESTÁ LOGUEADO
if(localStorage.getItem("accessToken")){
    window.location.href = "dashboard.html";
}

document
.getElementById("formRegistro")
.addEventListener("submit", registrar);

async function registrar(e){

    e.preventDefault();

    const messageDiv = document.getElementById("message");
    messageDiv.innerHTML = "";

    const name = document.getElementById("nombre").value.trim();
    const email = document.getElementById("correo").value.trim();
    const phone = document.getElementById("celular").value.trim();
    const pass1 = document.getElementById("pass1").value;
    const pass2 = document.getElementById("pass2").value;

    // VALIDACIONES
    if(pass1 !== pass2){
        messageDiv.innerHTML =
        `<div class="error">❌ Las contraseñas no coinciden</div>`;
        return;
    }

    if(pass1.length < 6){
        messageDiv.innerHTML =
        `<div class="error">Mínimo 6 caracteres</div>`;
        return;
    }

    try {

        const response = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                name,
                email,
                phone,
                password: pass1,
                accountType: "individual"
            })
        });

        const data = await response.json();

        if(!response.ok){
            messageDiv.innerHTML =
            `<div class="error">
                ${data.error || "Error en registro"}
            </div>`;
            return;
        }

        // TOKENS
        const accessToken = data?.data?.accessToken || data?.accessToken;
        const refreshToken = data?.data?.refreshToken || data?.refreshToken;

        // SESSION ID
        const sessionId =
            data?.data?.sessionId ||
            data?.sessionId ||
            data?.data?.currentSessionId ||
            data?.currentSessionId;

        if(accessToken){
            localStorage.setItem("accessToken", accessToken);
        }

        if(refreshToken){
            localStorage.setItem("refreshToken", refreshToken);
        }

        if(sessionId){
            localStorage.setItem("sessionId", sessionId);
        }

        messageDiv.innerHTML =
        `<div class="success">
            ✅ Registro exitoso
        </div>`;

        // REDIRECCIÓN
        setTimeout(()=>{
            window.location.href = "dashboard.html";
        },1000);

    } catch(error){

        console.error(error);

        messageDiv.innerHTML =
        `<div class="error">
            🚨 Servidor no disponible
        </div>`;
    }
}

</script>

</body>
</html>
