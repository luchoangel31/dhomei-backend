<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhomei - Dashboard</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    gap:20px;
    flex-wrap:wrap;
}

.menu{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.menu button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#111827;
    color:white;
}

.menu button:hover{
    opacity:.9;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.property-card{
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.property-card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

input,
textarea,
select{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

.primary{
    background:#111827;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
}

.primary:hover{
    opacity:.9;
}

.loading{
    padding:20px;
}

.error{
    color:red;
}

.success{
    color:green;
}

</style>

</head>

<body>

<div class="container">

    <div class="topbar">

        <h2 id="welcome">
            Cargando...
        </h2>

        <div class="menu">

            <button onclick="showHome()">
                Inicio
            </button>

            <button onclick="showForm()">
                Publicar
            </button>

            <button onclick="showMyProperties()">
                Mis propiedades
            </button>

            <button onclick="logoutAll()">
                Salir
            </button>

        </div>

    </div>

    <div id="contentArea"></div>

</div>

<script>

const API_URL = "https://dhomei-backend.onrender.com/api/v1";

const contentArea =
document.getElementById("contentArea");

/* =========================
   JWT
========================= */

function parseJwt(token){
  try{
    return JSON.parse(atob(token.split('.')[1]));
  }catch{
    return null;
  }
}

function isExpired(token){

  const payload = parseJwt(token);

  if(!payload) return true;

  return payload.exp * 1000 < Date.now();
}

/* =========================
   REFRESH
========================= */

async function refreshAccessToken(){

  const refreshToken =
  localStorage.getItem("refreshToken");

  if(!refreshToken){
    return null;
  }

  try{

    const res = await fetch(
      `${API_URL}/auth/refresh`,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          refreshToken
        })
      }
    );

    const data = await res.json();

    if(!res.ok){
      throw new Error();
    }

    localStorage.setItem(
      "accessToken",
      data.accessToken
    );

    if(data.refreshToken){
      localStorage.setItem(
        "refreshToken",
        data.refreshToken
      );
    }

    return data.accessToken;

  }catch(error){

    console.error(error);

    localStorage.clear();

    return null;
  }
}

/* =========================
   TOKEN
========================= */

async function getValidToken(){

  let token =
  localStorage.getItem("accessToken");

  if(!token){
    return null;
  }

  if(isExpired(token)){
    return await refreshAccessToken();
  }

  return token;
}

/* =========================
   FETCH AUTH
========================= */

async function fetchWithAuth(
  url,
  options = {}
){

  let token = await getValidToken();

  if(!token){

    window.location.href =
    "login.html";

    return;
  }

  options.headers = {
    ...(options.headers || {}),
    Authorization: `Bearer ${token}`
  };

  const res = await fetch(url, options);

  if(res.status === 401){

    localStorage.clear();

    window.location.href = "login.html";

    return;
  }

  return res;
}

/* =========================
   INIT
========================= */

document.addEventListener(
  "DOMContentLoaded",
  () => {
    validateSession();
  }
);

/* =========================
   VALIDAR SESION
========================= */

async function validateSession(){

  try{

    const res =
    await fetchWithAuth(
      `${API_URL}/auth/perfil`
    );

    if(!res){
      return;
    }

    const data = await res.json();

    const user =
      data?.data?.user ||
      data?.user ||
      data;

    if(!user?.email){
      throw new Error();
    }

    document.getElementById(
      "welcome"
    ).innerText =
    "Bienvenido " + user.email;

    showHome();

  }catch(error){

    console.error(error);

    localStorage.clear();

    window.location.href =
    "login.html";
  }
}

/* =========================
   HOME
========================= */

function showHome(){

  contentArea.innerHTML = `
    <div class="card">

      <h2>
        📊 Panel Dhomei
      </h2>

      <p>
        Sistema funcionando correctamente.
      </p>

    </div>
  `;
}

/* =========================
   FORM
========================= */

function showForm(){

  contentArea.innerHTML = `
    <div class="card">

      <h2>Publicar propiedad</h2>

      <input
        id="title"
        placeholder="Título"
      >

      <textarea
        id="description"
        placeholder="Descripción"
      ></textarea>

      <input
        id="price"
        type="number"
        placeholder="Precio"
      >

      <select id="operationType">

        <option value="">
          Tipo de operación
        </option>

        <option value="sale">
          Venta
        </option>

        <option value="rent">
          Alquiler
        </option>

      </select>

      <select id="propertyType">

        <option value="">
          Tipo de propiedad
        </option>

        <option value="house">
          Casa
        </option>

        <option value="apartment">
          Departamento
        </option>

        <option value="land">
          Terreno
        </option>

        <option value="office">
          Oficina
        </option>

        <option value="commercial">
          Local Comercial
        </option>

      </select>

      <input
        id="country"
        placeholder="País"
        value="Perú"
      >

      <input
        id="city"
        placeholder="Ciudad"
      >

      <input
        id="district"
        placeholder="Distrito"
      >

      <input
        id="address"
        placeholder="Dirección"
      >

      <input
        type="file"
        id="images"
        multiple
      >

      <button
        class="primary"
        onclick="createProperty()"
      >
        Publicar
      </button>

      <div id="message"></div>

    </div>
  `;
}
/* =========================
   CREAR
========================= */

async function createProperty(){

  const message =
  document.getElementById("message");

  const formData = new FormData();

  formData.append(
    "title",
    document.getElementById("title").value
  );

  formData.append(
    "description",
    document.getElementById("description").value
  );

  formData.append(
    "price",
    document.getElementById("price").value
  );

  formData.append(
    "operationType",
    document.getElementById("operationType").value
  );

  formData.append(
    "propertyType",
    document.getElementById("propertyType").value
  );

  formData.append(
    "country",
    document.getElementById("country").value
  );

  formData.append(
    "city",
    document.getElementById("city").value
  );

  formData.append(
    "district",
    document.getElementById("district").value
  );

  formData.append(
    "address",
    document.getElementById("address").value
  );

  const files =
  document.getElementById("images").files;

  for (let file of files) {

    formData.append(
      "images",
      file
    );

  }

  try {

    const res =
    await fetchWithAuth(
      `${API_URL}/properties`,
      {
        method: "POST",
        body: formData
      }
    );

    const data =
    await res.json();

    if (!res.ok) {

      throw new Error(
        data.error || "Error al publicar"
      );

    }

    message.innerHTML = `
      <div class="success">
        ✅ Propiedad publicada correctamente
      </div>
    `;

  } catch (error) {

    console.error(error);

    message.innerHTML = `
      <div class="error">
        ❌ ${error.message}
      </div>
    `;
  }
}
/* =========================
   PROPIEDADES
========================= */

async function showMyProperties(){

  contentArea.innerHTML =
  `<div class="loading">
    ⏳ Cargando...
  </div>`;

  try{

    const res =
    await fetchWithAuth(
      `${API_URL}/properties/my-properties`
    );

    if(!res){
      return;
    }

    const properties =
    await res.json();

    console.log("📦 PROPERTIES:", properties);

    if(!Array.isArray(properties)){

      contentArea.innerHTML =
      `<div class="error">
        ❌ Formato inválido de propiedades
      </div>`;

      return;
    }

    if(properties.length === 0){

      contentArea.innerHTML =
      `
      <div class="card">
        <h2>📭 No tienes propiedades</h2>
        <p>Publica tu primera propiedad.</p>
      </div>
      `;

      return;
    }

    let html = `<div class="grid">`;

    properties.forEach(p => {

      const image =
        p.images?.[0]?.imageUrl
        ? `https://dhomei-backend.onrender.com/${p.images[0].imageUrl}`
        : "https://via.placeholder.com/400x250?text=Sin+Imagen";

      html += `
      <div class="property-card">

        <img src="${image}">

        <h3>${p.title || 'Sin título'}</h3>

        <p>${p.location || p.city || 'Sin ubicación'}</p>

        <strong>
          S/ ${Number(p.price || 0).toLocaleString()}
        </strong>

      </div>
      `;
    });

    html += `</div>`;

    contentArea.innerHTML = html;

  }catch(error){

    console.error(error);

    contentArea.innerHTML =
    `<div class="error">
      ❌ Error cargando propiedades
    </div>`;
  }
}

/* =========================
   LOGOUT
========================= */

function logoutAll(){

  localStorage.clear();

  window.location.href =
  "login.html";
}

</script>

</body>
</html>
