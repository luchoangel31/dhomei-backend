<script>

/* =========================
   CONFIG
========================= */
const API_URL = "http://https://dhomei-backend.onrender.com/api/v1";

/* =========================
   JWT UTILS
========================= */
function parseJwt(token){
  try{
    return JSON.parse(atob(token.split('.')[1]));
  }catch{
    return null;
  }
}

function isExpired(token){
  const payload = parseJwt(token);
  if(!payload) return true;
  return payload.exp * 1000 < Date.now();
}

/* =========================
   DEVICE PARSER 🔥 NUEVO
========================= */
function getDeviceInfo(userAgent = ""){

  const ua = userAgent.toLowerCase();

  let browser = "Desconocido";

  if(ua.includes("chrome") && !ua.includes("edg")) browser = "Chrome";
  else if(ua.includes("firefox")) browser = "Firefox";
  else if(ua.includes("safari") && !ua.includes("chrome")) browser = "Safari";
  else if(ua.includes("edg")) browser = "Edge";

  let device = "💻 Desktop";
  if(/mobile|android|iphone/.test(ua)) device = "📱 Móvil";
  if(/tablet|ipad/.test(ua)) device = "📲 Tablet";

  return { browser, device };
}

/* =========================
   🔥 REFRESH TOKEN (CON sessionId)
========================= */
async function refreshAccessToken(){

  const refreshToken = localStorage.getItem("refreshToken");
  if(!refreshToken) return null;

  try{
    const res = await fetch(`${API_URL}/auth/refresh`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ refreshToken })
    });

    const data = await res.json();

    if(!res.ok) throw new Error();

    const newAccessToken = data.accessToken;
    const newRefreshToken = data.refreshToken;
    const sessionId = data.sessionId; // 🔥 NUEVO

    if(!newAccessToken) throw new Error();

    localStorage.setItem("accessToken", newAccessToken);

    // 🔥 ROTACIÓN REAL
    if(newRefreshToken){
      localStorage.setItem("refreshToken", newRefreshToken);
    }

    // 🔥 GUARDAR SESSION ID
    if(sessionId){
      localStorage.setItem("sessionId", sessionId);
    }

    console.log("🔄 Token renovado + sessionId");

    return newAccessToken;

  }catch{
    localStorage.clear();
    return null;
  }
}

/* =========================
   GET TOKEN
========================= */
async function getValidToken(){

  let token = localStorage.getItem("accessToken");

  if(!token) return null;

  if(isExpired(token)){
    console.log("⛔ Token expirado → refresh");
    return await refreshAccessToken();
  }

  return token;
}

/* =========================
   FETCH PRO
========================= */
async function fetchWithAuth(url, options = {}){

  let token = await getValidToken();

  if(!token){
    window.location.href = "login.html";
    return;
  }

  options.headers = {
    ...(options.headers || {}),
    Authorization: `Bearer ${token}`
  };

  let res = await fetch(url, options);

  if(res.status === 401){

    const newToken = await refreshAccessToken();

    if(!newToken){
      window.location.href = "login.html";
      return;
    }

    options.headers.Authorization = `Bearer ${newToken}`;

    res = await fetch(url, options);
  }

  return res;
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", () => {
  validateSession();
});

/* =========================
   VALIDAR SESIÓN
========================= */
async function validateSession(){

  const res = await fetchWithAuth(`${API_URL}/auth/perfil`);

  if(!res){
    window.location.href="login.html";
    return;
  }

  try{

    const data = await res.json();
    const user = data?.data?.user || data?.user || data;

    if(!user || !user.email) throw new Error();

    document.getElementById("welcome")
      .innerText = "Bienvenido " + user.email;

    showHome();

  }catch{
    localStorage.clear();
    window.location.href="login.html";
  }
}

/* =========================
   HOME
========================= */
function showHome(){
  contentArea.innerHTML=`
  <div class="card">
    <h2>📊 Panel Dhomei</h2>
    <p>Gestiona tus propiedades de forma profesional.</p>

    <button class="primary" onclick="showSessions()">
      📱 Ver sesiones activas
    </button>

    <button class="primary" onclick="logoutAll()" style="margin-top:10px;background:#b91c1c;">
      🚨 Cerrar todas las sesiones
    </button>
  </div>`;
}

/* =========================
   SESIONES 🔥 CON sessionId REAL
========================= */
async function showSessions(){

  contentArea.innerHTML = `<div class="loading">⏳ Cargando sesiones...</div>`;

  try{

    const res = await fetchWithAuth(`${API_URL}/auth/sessions`);
    const data = await res.json();

    const sessions = data.sessions || [];

    // 🔥 NUEVO MÉTODO SEGURO
    const currentSessionId = localStorage.getItem("sessionId");

    let html = `<div class="card"><h2>📱 Sesiones activas</h2>`;

    if(!sessions.length){
      html += `<p>No hay sesiones activas</p>`;
    }else{

      sessions.forEach(s=>{

        // 🔥 DETECCIÓN REAL
        const isCurrent = s.id == currentSessionId;

        const { browser, device } = getDeviceInfo(s.device);

        html += `
        <div style="
          margin-bottom:12px;
          padding:12px;
          border:1px solid #eee;
          border-radius:10px;
          background:${isCurrent ? "#ecfdf5" : "white"};
        ">

          <strong>${device} - ${browser}</strong><br>

          🌐 ${s.ip || 'IP desconocida'}<br>
          📍 ${s.location || 'Sin ubicación'}<br>
          🕒 ${new Date(s.createdAt).toLocaleString()}<br>

          ${
            isCurrent
            ? `<span style="color:#16a34a;font-weight:bold;">✔ Esta es tu sesión actual</span><br>
               <button onclick="logoutCurrentSession()" style="margin-top:5px;background:#dc2626;color:white;border:none;padding:6px 10px;border-radius:6px;">
                  Cerrar esta sesión
               </button>`
            : `<button onclick="logoutSession('${s.id}')" style="margin-top:5px;">
                  Cerrar sesión
               </button>`
          }

        </div>`;
      });
    }

    html += `</div>`;

    contentArea.innerHTML = html;

  }catch{
    contentArea.innerHTML = `<div class="error">Error cargando sesiones</div>`;
  }
}

/* =========================
   LOGOUT SESIÓN ACTUAL
========================= */
async function logoutCurrentSession(){

  const refreshToken = localStorage.getItem("refreshToken");

  try{
    await fetch(`${API_URL}/auth/logout`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ refreshToken })
    });
  }catch{}

  localStorage.clear();
  window.location.href="login.html";
}

/* =========================
   LOGOUT OTRA SESIÓN
========================= */
async function logoutSession(sessionId){

  try{
    await fetchWithAuth(`${API_URL}/auth/sessions/${sessionId}`,{
      method:"DELETE"
    });

    showSessions();

  }catch{
    alert("Error cerrando sesión");
  }
}

/* =========================
   FORM
========================= */
function showForm(){
  contentArea.innerHTML=`
  <div class="card">
    <h2>Publicar Propiedad</h2>

    <input id="title" placeholder="Título">
    <input id="location" placeholder="Ubicación">
    <input id="price" type="number" placeholder="Precio">
    <textarea id="description" placeholder="Descripción"></textarea>

    <input type="file" id="images" multiple>

    <button class="primary" onclick="createProperty()">Publicar</button>

    <div id="message"></div>
  </div>`;
}

/* =========================
   CREAR
========================= */
async function createProperty(){

  const message = document.getElementById("message");

  message.innerHTML = `<div class="loading">⏳ Publicando...</div>`;

  const formData = new FormData();

  formData.append("title", title.value);
  formData.append("location", location.value);
  formData.append("price", price.value);
  formData.append("description", description.value);

  const files = document.getElementById("images").files;

  for(let file of files){
    formData.append("images", file);
  }

  try{

    const res = await fetchWithAuth(`${API_URL}/properties`,{
      method:"POST",
      body: formData
    });

    if(!res.ok) throw new Error();

    message.innerHTML = `<div class="success">✅ Publicado</div>`;

    showMyProperties();

  }catch{
    message.innerHTML = `<div class="error">Error al publicar</div>`;
  }
}

/* =========================
   MIS PROPIEDADES
========================= */
async function showMyProperties(){

  contentArea.innerHTML = `<div class="loading">⏳ Cargando...</div>`;

  try{

    const res = await fetchWithAuth(`${API_URL}/properties/my`);
    const properties = await res.json();

    let html = `<div class="grid">`;

    properties.forEach(p=>{
      html += `
      <div class="property-card">
        <img src="http://https://dhomei-backend.onrender.com/${p.images?.[0] || ''}">
        <strong>${p.title}</strong><br>
        ${p.location}<br>
        S/ ${Number(p.price).toLocaleString()}
      </div>`;
    });

    html += `</div>`;

    contentArea.innerHTML = html;

  }catch{
    contentArea.innerHTML = `<div class="error">Error cargando propiedades</div>`;
  }
}

/* =========================
   LOGOUT GLOBAL
========================= */
async function logoutAll(){

  try{
    await fetchWithAuth(`${API_URL}/auth/logout-all`,{
      method:"POST"
    });
  }catch{}

  localStorage.clear();
  window.location.href="login.html";
}

</script>
