<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhomei - Iniciar Sesión</title>

<link rel="stylesheet" href="css/styles.css">

<style>
.container{
  max-width:450px;
  margin:80px auto;
  background:white;
  padding:40px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#0a0f29;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.error{color:red;margin-top:10px;}
.success{color:green;margin-top:10px;}
</style>
</head>

<body>

<!-- NAVBAR GLOBAL -->
<header class="navbar">
  <div class="logo">Dhomei</div>

  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="comprar.html">Comprar</a>
    <a href="alquilar.html">Alquilar</a>
    <a href="contacto.html">Contacto</a>
  </nav>
</header>

<div class="container">

<h2>Iniciar Sesión</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Correo electrónico" required>

<input type="password" id="password" placeholder="Contraseña" required>

<button type="submit">Ingresar</button>

<div id="message"></div>

<p>
¿No tienes cuenta?
<a href="registro.html">Regístrate aquí</a>
</p>

</form>

</div>

<!-- 🔥 SCRIPT EXTERNO -->
<script src="js/login.js"></script>

</body>
</html>
